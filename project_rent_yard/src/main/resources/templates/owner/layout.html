<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:fragment="layout(content, pageTitle)">

<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Admin</title>

    <th:block th:replace="layout/layout :: library"></th:block>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body { overflow-x: hidden; }

        .sidebar {
            height: 100vh;
            background-color: #212529;
        }
        .sidebar {
            position: fixed;
            top: 0;
            left: 0;
            width: 16.666667%;
            height: 100vh;
        }

        .content {
            margin-left: 16.666667%;
        }

        .sidebar a {
            color: aqua;
            display: block;
            padding: 12px 20px;
            text-decoration: none;
        }

        .sidebar a:hover {
            background-color: #343a40;
        }

        .content {
            padding: 20px;
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <div class="row">

        <!-- Sidebar -->
        <div class="col-2 sidebar">
            <h4 class="text-white text-center py-3">Owner</h4>

            <a th:href="@{/owners/profit}">Doanh thu</a>
            <a th:href="@{/owners/yard}">Quản lí sân</a>
            <a th:href="@{/owners/user}">Quản lí tài khoản </a>
        </div>

        <!-- Content -->
        <div class="col-10 content">
            <div th:insert="${content}"></div>
        </div>

    </div>
</div>

</body>
</html>
