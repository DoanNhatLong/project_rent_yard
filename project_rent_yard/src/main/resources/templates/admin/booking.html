<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: layout(~{::section}, 'Quản lý Booking')}">

<section>
    <h3>Quản lý Booking</h3>
    <form action="" method="get">
        <select name="status">
            <option value="">Tất cả</option>
            <option th:each="status : ${status}"
                    th:value="${status.name()}"
                    th:text="${status.name()}">
            </option>
        </select>
        <input name="userName" type="text" placeholder="Tên khách hàng"
               th:value="${param.userName}">
        <input type="date" name="bookingDate">
        <button type="submit">Lọc</button>
    </form>

    <div class="card">
        <div th:if="${page.totalElements == 0}" class="alert alert-warning text-center">
            Không có booking phù hợp
        </div>
        <div class="card-body">
            <div th:replace="~{layout/table :: table(
        ${data},
        ${headers},
        ${fields},
        ~{::bookingActions}
)}">
            </div>
        </div>
    </div>

        <nav th:if="${page.totalPages > 1}">
            <ul class="pagination justify-content-center">

                <!-- Prev -->
                <li class="page-item" th:classappend="${page.first} ? 'disabled'">
                    <a class="page-link"
                       th:if="${!page.first}"
                       th:href="@{/admins/booking(
                    page=${page.number - 1},
                    status=${param.status},
                    userName=${param.userName},
                    bookingDate=${param.bookingDate}
               )}">
                        &laquo;
                    </a>
                    <span class="page-link" th:if="${page.first}">&laquo;</span>
                </li>

                <!-- Page numbers -->
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, page.totalPages - 1)}"
                    th:classappend="${i == page.number} ? 'active'">

                    <a class="page-link"
                       th:text="${i + 1}"
                       th:href="@{/admins/booking(
                    page=${i},
                    status=${param.status},
                    userName=${param.userName},
                    bookingDate=${param.bookingDate}
               )}">
                    </a>
                </li>

                <!-- Next -->
                <li class="page-item" th:classappend="${page.last} ? 'disabled'">
                    <a class="page-link"
                       th:if="${!page.last}"
                       th:href="@{/admins/booking(
                    page=${page.number + 1},
                    status=${param.status},
                    userName=${param.userName},
                    bookingDate=${param.bookingDate}
               )}">
                        &raquo;
                    </a>
                    <span class="page-link" th:if="${page.last}">&raquo;</span>
                </li>

            </ul>
        </nav>

    <div th:fragment="bookingActions">
        <div class="d-flex gap-2">

            <a th:href="@{/admins/booking/addService/{id}(id=${row.id})}"
               class="btn btn-sm btn-info">
                Thêm dịch vụ
            </a>

            <a th:href="@{/admins/booking/delete/{id}(id=${row.id})}"
               class="btn btn-sm btn-danger"
               onclick="return confirm('Bạn chắc chắn muốn xóa?')">
                Xóa
            </a>

        </div>
    </div>
</section>



</html>
