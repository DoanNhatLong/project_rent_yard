<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detail</title>
    <th:block th:replace="layout/layout :: library"></th:block>
</head>
<body>
<div th:replace="layout/navbar :: navbar"></div>
<div class="container mt-5">

    <div class="card shadow-sm">
        <div class="container mt-5 mb-5">

            <h3 class="text-center fw-bold mb-5">LỊCH SỬ ĐẶT SÂN</h3>

            <!-- Không có dữ liệu -->
            <div th:if="${#lists.isEmpty(history)}"
                 class="text-center text-muted">
                Chưa có lịch sử đặt sân
            </div>

            <!-- Có dữ liệu -->
            <div th:each="item, stat : ${history}">

                <!-- Hiển thị ngày nếu là phần tử đầu hoặc khác ngày trước -->
                <div th:if="${stat.index == 0
                    or item.bookingDate != history[stat.index-1].bookingDate}"
                     class="mb-3 mt-4">

                    <h5 class="fw-bold text-primary border-bottom pb-2"
                        th:text="${#temporals.format(item.bookingDate,'dd/MM/yyyy')}">
                    </h5>
                </div>

                <!-- Card booking -->
                <div class="card border-0 shadow-sm mb-3 rounded-4">

                    <div class="card-body d-flex justify-content-between align-items-center">

                        <!-- Thông tin sân -->
                        <div>
                            <h6 class="fw-semibold mb-1"
                                th:text="${item.fieldName}">
                            </h6>

                            <div class="text-muted small">
                                ⏰ <span th:text="${item.startTime}"></span>
                                -
                                <span th:text="${item.endTime}"></span>
                                &nbsp; | &nbsp;
                                💰 <span th:text="${#numbers.formatDecimal(item.fieldPrice,0,'COMMA',0,'POINT')} + ' đ'"></span>
                            </div>
                        </div>

                        <!-- Trạng thái + Hủy -->
                        <div class="text-end">

                            <!-- Status -->
                            <span class="badge px-3 py-2 mb-2"
                                  th:classappend="${item.status.name() == 'PENDING'}
                                           ? ' bg-warning text-dark'
                                           : ' bg-secondary'"
                                  th:text="${item.status}">
                    </span>

                            <br/>

                            <!-- Button mở modal -->
                            <button type="button"
                                    class="btn btn-sm"
                                    th:classappend="${item.status.name() == 'PENDING'}
                                             ? ' btn-danger'
                                             : ' btn-outline-secondary'"
                                    th:disabled="${item.status.name() != 'PENDING'}"
                                    data-bs-toggle="modal"
                                    th:data-bs-target="'#cancelModal' + ${item.id}">
                                Hủy
                            </button>

                        </div>
                    </div>
                </div>

                <!-- Modal xác nhận -->
                <div class="modal fade"
                     th:id="'cancelModal' + ${item.id}"
                     tabindex="-1">

                    <div class="modal-dialog">
                        <div class="modal-content rounded-4">

                            <div class="modal-header">
                                <h5 class="modal-title">Xác nhận hủy booking</h5>
                                <button type="button" class="btn-close"
                                        data-bs-dismiss="modal"></button>
                            </div>

                            <div class="modal-body">
                                Bạn có chắc muốn hủy đặt sân
                                <strong th:text="${item.fieldName}"></strong>
                                vào ngày
                                <strong th:text="${#temporals.format(item.bookingDate,'dd/MM/yyyy')}"></strong>
                                không?
                            </div>

                            <div class="modal-footer">

                                <button type="button"
                                        class="btn btn-secondary"
                                        data-bs-dismiss="modal">
                                    Đóng
                                </button>

                                <form th:action="@{/booking/cancel/{id}(id=${item.id})}"
                                      method="post">

                                    <button type="submit"
                                            class="btn btn-danger">
                                        Xác nhận hủy
                                    </button>

                                </form>

                            </div>

                        </div>
                    </div>
                </div>

            </div>

        </div>
    </div>

</div>

</body>

</html>
